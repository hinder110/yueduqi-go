services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: yueduqi
      POSTGRES_PASSWORD: yueduqi123
      POSTGRES_DB: yueduqi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yueduqi"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: yueduqi
      DB_USER: yueduqi
      DB_PASSWORD: yueduqi123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
