<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85d04"/>
      <stop offset="100%" style="stop-color:#d45500"/>
    </linearGradient>
    <linearGradient id="pages" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0e8dc"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Book pages - left -->
  <path d="M88 60 L88 180 Q88 190 78 192 L48 198 L48 68 L78 72 Q88 74 88 84Z" fill="#f5f0e8" stroke="#d4c5a0" stroke-width="1"/>
  <!-- Book pages - right thick -->
  <path d="M128 56 L128 176 Q128 190 138 192 L200 196 L200 62 L138 66 Q128 68 128 78Z" fill="url(#pages)" stroke="#d4c5a0" stroke-width="1"/>
  <!-- Book spine -->
  <rect x="76" y="52" width="64" height="180" rx="6" fill="#f0e8d0" stroke="#c4b590" stroke-width="1.5"/>
  <line x1="108" y1="52" x2="108" y2="232" stroke="#ddd5c0" stroke-width="0.5"/>
  <!-- Text lines on left page -->
  <line x1="56" y1="88" x2="88" y2="88" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="104" x2="88" y2="104" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="120" x2="82" y2="120" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="136" x2="88" y2="136" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="152" x2="78" y2="152" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <!-- Text lines on right page -->
  <line x1="120" y1="88" x2="180" y2="88" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="104" x2="176" y2="104" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="120" x2="184" y2="120" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="136" x2="168" y2="136" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="152" x2="180" y2="152" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="168" x2="172" y2="168" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="184" x2="182" y2="184" stroke="#c8c0a8" stroke-width="2" stroke-linecap="round"/>
  <!-- Bookmark ribbon -->
  <path d="M140 52 L140 88 L148 80 L156 88 L156 52" fill="#e85d04" stroke="#c44a00" stroke-width="0.5"/>
